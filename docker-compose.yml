version: '3.8'

services:
  truth-panel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "5000:5000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - PORT=3000
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - flyway
    restart: on-failure

  flyway:
    image: flyway/flyway:latest
    command: -baselineOnMigrate=true -locations=filesystem:/flyway/sql migrate
    volumes:
      - ./db/migration:/flyway/sql
    environment:
      - FLYWAY_URL=${FLYWAY_URL}
      - FLYWAY_USER=${FLYWAY_USER}
      - FLYWAY_PASSWORD=${FLYWAY_PASSWORD}
    restart: on-failure

networks:
  truth_network:
    driver: bridge
