version: '3.8'

services:
  truth-panel-api:
    container_name: truth-panel-api
    build:
      context: .
      dockerfile: Dockerfile
    command: npm start
    ports:
      - "${APP_PORT}:${APP_PORT}"
      - "${API_PORT}:${API_PORT}"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=${APP_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CSP_CONNECT_SRC=${CSP_CONNECT_SRC}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - INTERNAL_HOST=${INTERNAL_HOST}
    depends_on:
      - flyway
      - redis
    networks:
      - truth_network
    restart: on-failure
    labels:
      logging: "promtail"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${INTERNAL_HOST}:${API_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  truth-panel-worker:
    container_name: truth-panel-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: node app/backend/worker.js
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - truth_network
    restart: on-failure
    labels:
      logging: "promtail"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "node", "-e", "require('./app/backend/config/redisClient').ping().then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - truth_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:latest
    command: -baselineOnMigrate=true -locations=filesystem:/flyway/sql -placeholders.GRAFANA_DB_PASSWORD=${GRAFANA_DB_PASSWORD} migrate
    volumes:
      - ./db/migration:/flyway/sql
    environment:
      - FLYWAY_URL=${FLYWAY_URL}
      - FLYWAY_USER=${FLYWAY_USER}
      - FLYWAY_PASSWORD=${FLYWAY_PASSWORD}
    networks:
      - truth_network
    restart: on-failure

  # --- OBSERVABILITY STACK (Internal TATA Only) ---
  loki:
    image: grafana/loki:latest
    ports:
      - "${LOKI_PORT}:${LOKI_PORT}"
    volumes:
      - ./config/infra/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml -config.expand-env=true
    networks:
      - truth_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://${INTERNAL_HOST}:${LOKI_PORT}/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./config/infra/promtail-config.yaml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/var/log
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    networks:
      - truth_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/infra/prometheus.yaml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:${PROMETHEUS_PORT}'
    networks:
      - truth_network
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT}:${APP_PORT}" # Mapped to external port via env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/infra/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./config/infra/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/infra/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DATABASE_USER=${GRAFANA_DB_USER}
      - GF_DATABASE_PASSWORD=${GRAFANA_DB_PASSWORD}
      - GF_DATABASE_NAME=${DATABASE_NAME}
      - GF_DATABASE_HOST=${DATABASE_HOST}
      - GF_DATABASE_PORT=${DATABASE_PORT}
      - LOKI_PORT=${LOKI_PORT}
      - PROMETHEUS_PORT=${PROMETHEUS_PORT}
    networks:
      - truth_network
    depends_on:
      - loki
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://${INTERNAL_HOST}:${APP_PORT}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  loki_data:
  grafana_data:

networks:
  truth_network:
    driver: bridge
